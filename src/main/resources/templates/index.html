<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>University Admin Dashboard</h1>
</header>

<div class="container">
    <div class="card"><a href="/student">Student Advising</a></div>
    <div class="card"><a href="/chat">Communication</a></div>
    <div class="card"><a href="/schedule">Scheduling</a></div>
    <div class="card"><a href="/docs">Documentation</a></div>
    <div class="card"><a href="/admin">Admin System</a></div>
</div>

</body>
</html>
