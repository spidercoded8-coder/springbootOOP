<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Document</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; padding:20px; }

        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            width:300px;
        }

        input {
            width:100%;
            padding:8px;
            margin:10px 0;
        }

        button {
            padding:8px;
            background:#3498db;
            color:white;
            border:none;
        }
    </style>
</head>
<body>

<h2>Edit Document</h2>

<div class="box">
    <form action="/updateDoc" method="post">
        <input type="hidden" name="id" th:value="${doc.id}">

        <input name="name" th:value="${doc.name}" required>

        <input name="link" th:value="${doc.link}" required>

        <button>Update</button>
    </form>
</div>

<a href="/docs">⬅ Back</a>

</body>
</html>
